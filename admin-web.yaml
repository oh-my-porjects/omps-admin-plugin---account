# account 公共模块完整 admin-web spec（task/inner_plugin.md §5.2）

module: account
module_title: 账号管理

menus:
  - key: accounts
    title: 账号列表
    icon: user
    roles: [admin, developer, operator]
    views: [account_list]
  - key: roles
    title: 账号详情
    icon: team
    roles: [admin, developer]
    views: [account_detail]

views:
  - key: account_list
    type: table
    title: 平台账号管理
    api: GET /api/account/list
    columns:
      - field: id
        title: ID
      - field: account
        title: 账号名
      - field: status
        title: 状态
        render: enum
        enum:
          enabled: 启用
          disabled: 禁用
      - field: is_super_admin
        title: 超管
        render: enum
        enum:
          "true": 是
          "false": 否
      - field: created_at
        title: 创建时间
        render: datetime
      - field: last_login_at
        title: 最后登录时间
        render: datetime
    actions:
      - key: create
        type: page
        title: 新建账号
        api: POST /api/account/create
      - key: reset_pwd
        type: row
        title: 重置密码
        api: PUT /api/account/reset-password
      - key: toggle_ban
        type: row
        title: 修改账号
        api: PUT /api/account/update
        danger: true

  - key: account_detail
    type: detail
    title: 账号详情
    api: GET /api/account/detail
    fields:
      - field: account_id
        title: 账号 ID
      - field: account
        title: 账号名
      - field: role_ids
        title: 角色
        render: json

roles:
  - code: admin
    title: 超级管理员
  - code: developer
    title: 开发者
  - code: operator
    title: 运维
