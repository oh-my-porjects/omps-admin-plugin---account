# account 公共模块完整 admin-web spec（task/inner_plugin.md §5.2）

module: account
module_title: 账号管理

menus:
  - key: accounts
    title: 账号列表
    icon: user
    roles: [admin, developer, operator]
    views: [account_list]

views:
  - key: account_list
    type: table
    title: 平台账号管理
    api: GET /api/account/list
    columns:
      - field: id
        title: ID
        hidden: true
      - field: account_id
        title: 账号 ID
        render: short_id
      - field: account
        title: 账号名
      - field: role_ids
        title: 角色
        render: json
      - field: status
        title: 状态
        render: enum
        enum:
          enabled: 启用
          disabled: 禁用
      - field: is_super_admin
        title: 超管
        render: enum
        enum:
          "true": 是
          "false": 否
      - field: created_at
        title: 创建时间
        render: datetime
      - field: updated_at
        title: 更新时间
        render: datetime
    actions:
      - key: detail
        type: row
        title: 查看详情
        target: account_detail
      - key: create
        type: page
        title: 新建账号
        api: POST /api/account/create
        fields:
          - field: account
            title: 账号名
            type: string
            required: true
            placeholder: 4-32 个字符
          - field: password
            title: 初始密码
            type: string
            sensitive: true
            required: true
            placeholder: 6-32 个字符
          - field: status
            title: 状态
            type: enum
            required: true
            default: enabled
            enum:
              enabled: 启用
              disabled: 禁用
          - field: role_ids
            title: 角色 ID 列表
            type: json
            required: true
            default: []
            placeholder: '["角色ID"]，可填 []'
      - key: reset_pwd
        type: row
        title: 重置密码
        api: PUT /api/account/reset-password
        fields:
          - field: account_id
            title: 账号 ID
            type: string
            hidden: true
            required: true
          - field: new_password
            title: 新密码
            type: string
            sensitive: true
            required: true
            placeholder: 6-32 个字符
      - key: toggle_ban
        type: row
        title: 修改账号
        api: PUT /api/account/update
        danger: true
        confirm: 修改账号状态或角色绑定会立即影响该账号登录和权限，请确认
        fields:
          - field: account_id
            title: 账号 ID
            type: string
            hidden: true
            required: true
          - field: status
            title: 状态
            type: enum
            required: true
            enum:
              enabled: 启用
              disabled: 禁用
          - field: role_ids
            title: 角色 ID 列表
            type: json
            required: true
            placeholder: '["角色ID"]，可填 []'

  - key: account_detail
    type: detail
    title: 账号详情
    api: GET /api/account/detail
    fields:
      - field: account_id
        title: 账号 ID
      - field: account
        title: 账号名
      - field: role_ids
        title: 角色
        render: json

roles:
  - code: admin
    title: 超级管理员
  - code: developer
    title: 开发者
  - code: operator
    title: 运维
