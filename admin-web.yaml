module: account
title: 账号管理
icon: user

menu:
  - key: accounts
    title: 账号列表
    view: account_list
  - key: roles
    title: 账号角色绑定
    view: account_role_binding

views:
  - key: account_list
    type: table
    title: 平台账号管理
    api: GET /api/account/list
    columns:
      - field: id
        title: ID
      - field: account
        title: 账号名
      - field: status
        title: 状态
        render: enum
        enum:
          enabled: 启用
          disabled: 禁用
      - field: is_super_admin
        title: 超管
        render: enum
        enum:
          true: 是
          false: 否
      - field: created_at
        title: 创建时间
        render: datetime
      - field: last_login_at
        title: 最后登录时间
        render: datetime
    actions:
      - key: create
        type: page
        title: 新建账号
        api: POST /api/account/create
      - key: reset_pwd
        type: row
        title: 重置密码
        api: POST /api/account/{id}/reset-password
      - key: toggle_ban
        type: row
        title: 启用/禁用
        api: POST /api/account/{id}/toggle-ban
        danger: true

  - key: account_role_binding
    type: detail
    title: 账号角色绑定
    api: GET /api/account/role-bindings