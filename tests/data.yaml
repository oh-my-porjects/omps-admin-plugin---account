  account_role_bindings:
    primary_key: id
    range_filter: "account_id IN (SELECT id FROM account_accounts WHERE account LIKE '${range_tag}%')"
    snapshot_view: [id, account_id, role_id, created_at]
    snapshot_summary: "account_id, role_id"
    seed_data:
      - {id: "10000000-0000-0000-0001-000000000000", account_id: "10000000-0000-0000-0000-000000000002", role_id: "00000000-0000-0000-0000-000000000003", created_at: "2026-05-20T00:00:00Z"}
