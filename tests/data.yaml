range_tag: "test_req{req_id}_"

noise_fields:
  - "account_accounts.password_hash"
  - "account_accounts.expires_at"
  - "account_accounts.updated_at"

tables:
  account_accounts:
    primary_key: id
    range_filter: "(account LIKE '${range_tag}%' OR (id = '00000000-0000-0000-0000-0000000000fe' AND is_temporary = TRUE))"
    snapshot_view: [id, account, status, is_super_admin, is_temporary, expires_at, created_at, updated_at]
    snapshot_summary: "account, status, is_super_admin"
    seed_data:
      - {id: "10000000-0000-0000-0000-000000000001", account: "${range_tag}root", password_hash: "ffeaab6b8ac737ab4cd68fb33c28cad1b9c7ea1417492b5da885767c4da04c5b", status: "enabled", is_super_admin: true, is_temporary: false, expires_at: null, created_at: "2026-05-20T00:00:00Z", updated_at: "2026-05-20T00:00:00Z"}
      - {id: "10000000-0000-0000-0000-000000000002", account: "${range_tag}operator", password_hash: "448296e3138d4843057574ba9fbd21829f1f6d40891ce89664608ce55005a7ef", status: "enabled", is_super_admin: false, is_temporary: false, expires_at: null, created_at: "2026-05-20T00:00:00Z", updated_at: "2026-05-20T00:00:00Z"}
      - {id: "10000000-0000-0000-0000-000000000003", account: "${range_tag}disabled_admin", password_hash: "07f5e3ff8cc5a206371263aa73e6aa01244a00408fbcd526c4033a7bd2ccb88e", status: "disabled", is_super_admin: true, is_temporary: false, expires_at: null, created_at: "2026-05-20T00:00:00Z", updated_at: "2026-05-20T00:00:00Z"}
